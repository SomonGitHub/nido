name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin

  hassfest:
    name: Hassfest (skipped — frontend plugin)
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "Hassfest n'est pas requis pour les plugins frontend."

  build:
    name: Build bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Verify nido.js exists at repo root
        run: test -f nido.js && echo "OK"
